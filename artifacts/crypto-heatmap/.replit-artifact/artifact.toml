kind = "web"
previewPath = "/"
title = "Crypto RSI Heatmap"
version = "1.0.0"
id = "artifacts/crypto-heatmap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23508

[services.development]
run = "pnpm --filter @workspace/crypto-heatmap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-heatmap", "run", "build" ]
publicDir = "artifacts/crypto-heatmap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23508"
BASE_PATH = "/"
